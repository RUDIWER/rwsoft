services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    command: php artisan serve --host=0.0.0.0 --port=8000
    ports:
      - '${APP_PORT:-80}:8000'
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy

  vite:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    command: npm run dev -- --host=0.0.0.0
    ports:
      - '${VITE_PORT:-5173}:5173'
    volumes:
      - .:/var/www/html
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-rwsoft}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rwsoft}
    ports:
      - '${DB_FORWARD_PORT:-3307}:3306'
    volumes:
      - rwsoft-mysql:/var/lib/mysql
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          '127.0.0.1',
          '-u',
          'root',
          '-p${DB_PASSWORD:-rwsoft}',
        ]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  rwsoft-mysql:
